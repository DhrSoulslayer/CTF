version: '3.8'

services:
  ctf:
    build: .
    ports:
      - "3000:3000"
    environment:
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-changeme}
      - DB_PATH=/data/app.db
      - PORT=3000
    volumes:
      - ctf-data:/data
    restart: unless-stopped

volumes:
  ctf-data:
