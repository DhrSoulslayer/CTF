services:
  ctf:
    container_name: ctf
    image: dhrsoulslayer/ctf:latest
    ports:
      - "3456:3456"
    environment:
      - ADMIN_USER=admin
      - ADMIN_PASS=ultrageheim01!
      - DB_PATH=/data/app.db
      - PORT=3456
    volumes:
      - ctf-data:/data
    restart: unless-stopped

volumes:
  ctf-data:
